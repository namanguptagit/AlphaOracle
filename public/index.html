<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaOracle Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orb"></div>
    <div class="background-orb orb-2"></div>
    
    <div class="dashboard">
        <header class="glass-panel text-center">
            <h1>AlphaOracle <span class="badge">Live</span></h1>
            <p>Autonomous Prediction Market Agent</p>
        </header>

        <div class="grid">
            <!-- Left panel: Terminal Logs -->
            <div class="glass-panel terminal-wrapper">
                <h3>Terminal Logs</h3>
                <div class="terminal" id="terminal">
                    <!-- Logs stream here -->
                </div>
            </div>

            <!-- Right panel: Decision Matrix -->
            <div class="glass-panel decision-matrix">
                <h3>Decision Matrix</h3>
                <div class="gauge-container">
                    <div class="circular-progress" id="confidence-ring">
                        <div class="value-container">
                            <span id="confidence-value">0%</span>
                            <span class="label">Confidence</span>
                        </div>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <span class="label">Market ID</span>
                        <span class="value" id="market-id">Awaiting...</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">Execution</span>
                        <span class="value" id="execution-decision">HOLD</span>
                    </div>
                </div>
                <div class="stat-box" style="margin-bottom: 1rem;">
                    <span class="label">Transaction ID</span>
                    <span class="value" id="transaction-id" style="font-size: 0.8rem; word-break: break-all; color: var(--text-muted)">N/A</span>
                </div>

                <div class="reasoning-box">
                    <span class="label">LLM Reasoning</span>
                    <p id="reasoning-text">Waiting for data ingestion...</p>
                </div>

                <!-- Ledger Container injected inside decision matrix panel -->
                <div class="ledger-container" style="margin-top: 1rem;">
                    <span class="label" style="text-transform: uppercase; font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 0.5rem;">Live Trade Ledger</span>
                    <div id="ledger-list" class="ledger-list">
                        <div class="ledger-empty">Awaiting first execution...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
